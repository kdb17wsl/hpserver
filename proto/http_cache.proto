syntax = "proto3";

package hpserver.cache;

message HeaderEntry {
  string key = 1;
  string value = 2;
}

message HttpCacheEntry {
  uint32 status_code = 1;
  string reason_phrase = 2;
  string last_modified = 3;
  string etag = 4;
  int64 stored_at_unix_sec = 5;
  int64 ttl_sec = 6;
  repeated HeaderEntry headers = 7;
  bytes body = 8;
  repeated string vary_headers = 9;
}
